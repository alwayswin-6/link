databases:
  - name: link-db
    plan: free
    databaseName: link
    user: link

services:
  - type: web
    name: link
    runtime: node
    plan: free
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      # Do not set HOST — the app forces 0.0.0.0 when RENDER is present.
      # Do not rely on a .env file — Render injects these into process.env.
      - key: DATABASE_URL
        fromDatabase:
          name: link-db
          property: connectionString
      # Public site URL (required for CORS / email links). Set in Dashboard, e.g.
      # https://link-xxxx.onrender.com
      - key: APP_URL
        sync: false
      # Optional SMTP (registration is direct — no OTP email required).
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM_NAME
        value: link
      - key: SMTP_FROM_EMAIL
        sync: false
      # Required for admin console seed during build. Set in Dashboard.
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
